# To create the conda environment, run:
#   conda env create -f env.yml
# To activate the environment, run:
#   conda activate branchprice_jssp_env
# To update the environment after changes, run:
#   conda env update -f env.yml --prune
# To export the environment to a new file, run:
#   conda env export > env.yml
name: branchprice_jssp_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11.15
  - scip=9.2.3
  - pip=26.0.1
  - numba=0.65.1
  - typer=0.25.1
  - Cython=3.2.4
  - pandas=3.0.2
  - numpy=2.4.3
  - pip:
      - ./pyscipopt
